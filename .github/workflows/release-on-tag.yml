# Turns a version tag into a GitHub Release pointing at the npm-published
# version. Tags are pushed by the private repo's mirror-sync workflow (one
# per package.json version, at sync time); this repo mirrors docs/examples —
# the installable artifact lives on npm. The mirror generator never touches
# .github/, so this workflow survives syncs. Idempotent: re-pushed tags and
# pre-created releases are skipped.
name: Release on version tag
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release for npm version
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "@nika-js/onlymap $VERSION" \
            --notes "Published on npm: https://www.npmjs.com/package/@nika-js/onlymap/v/$VERSION

\`\`\`bash
npm install @nika-js/onlymap@$VERSION
\`\`\`

This repository mirrors the documentation, runnable examples, and agent skill for that version — the installable package lives on npm."
